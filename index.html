/* ─── Design Tokens (CSS) ─── */
const css = `
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap');

:root {
  --navy: #1B2B4B;
  --navy-hover: #2E4270;
  --blush: #F9EEE8;
  --blush-border: #EDD8CC;
  --rose: #C96A52;
  --rose-hover: #B05540;
  --gold: #E8B84B;
  --gold-bg: #FDF6E3;
  --teal: #3D8C8C;
  --text: #1A1A2E;
  --text-muted: #6B7280;
  --text-light: rgba(255,255,255,0.65);
  --white: #FFFFFF;
  --dark-footer: #111827;
  --shadow-card: 0 4px 24px rgba(27,43,75,0.09);
  --shadow-hover: 0 14px 44px rgba(27,43,75,0.16);
  --shadow-nav: 0 2px 20px rgba(27,43,75,0.18);
  --radius-lg: 16px;
  --radius-md: 10px;
  --radius-sm: 6px;
  --radius-pill: 50px;
  --font-display: 'DM Serif Display', serif;
  --font-body: 'Heebo', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  direction: rtl;
  color: var(--text);
  background: var(--white);
  overflow-x: hidden;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── NAV ─── */
.nav {
  height: 58px;
  background: var(--navy);
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow-nav);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
}
.nav-logo {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-display);
  font-size: 1.5rem;
  color: white;
  direction: ltr;
  display: flex; align-items: center; gap: 4px;
}
.nav-logo .gold { color: var(--gold); }
.nav-links { list-style: none; display: flex; gap: 4px; align-items: center; }
.nav-links button {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-body);
  font-weight: 500; font-size: 0.82rem;
  color: rgba(255,255,255,0.6);
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  transition: all 0.2s ease;
}
.nav-links button:hover { color: white; background: rgba(255,255,255,0.08); }
.nav-links button.active { color: var(--gold); background: rgba(232,184,75,0.12); font-weight: 700; }


/* ─── HERO ─── */
.hero {
  display: grid; grid-template-columns: 1fr 1fr;
  min-height: 54vh; background: var(--blush);
}
.hero-content {
  padding: 64px 72px; display: flex; flex-direction: column; justify-content: center; gap: 20px;
}
.hero-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--navy); color: var(--gold);
  padding: 6px 16px; border-radius: var(--radius-pill);
  font-size: 0.72rem; font-weight: 600; width: fit-content;
}
.hero h1 {
  font-family: var(--font-body); font-weight: 800;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  line-height: 1.3; color: var(--navy);
}
.hero h1 em {
  color: var(--rose); font-style: normal;
  position: relative; display: inline;
}
.hero h1 em::after {
  content: ''; position: absolute; bottom: 2px; right: 0; width: 100%; height: 3px;
  background: var(--gold); border-radius: 2px;
}
.hero-subtitle {
  color: var(--text-muted); font-weight: 300; font-size: 0.95rem;
  max-width: 380px; line-height: 1.7;
}
.hero-cta-row { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-primary {
  background: var(--rose); color: white; border: none; cursor: pointer;
  padding: 12px 28px; border-radius: var(--radius-pill);
  font-family: var(--font-body); font-weight: 600; font-size: 0.88rem;
  transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary:hover { background: var(--rose-hover); }
.btn-secondary {
  background: transparent; color: var(--navy); border: 2px solid var(--navy);
  padding: 10px 24px; border-radius: var(--radius-pill);
  font-family: var(--font-body); font-weight: 600; font-size: 0.88rem;
  cursor: pointer; transition: all 0.2s ease;
}
.btn-secondary:hover { background: var(--navy); color: white; }
.hero-stats {
  display: flex; gap: 32px; padding-top: 20px; margin-top: 12px;
  border-top: 1px solid var(--blush-border); flex-wrap: wrap;
}
.hero-stat { text-align: center; }
.hero-stat .num { font-family: var(--font-display); font-size: 1.3rem; color: var(--navy); display: block; }
.hero-stat .label { font-size: 0.72rem; color: var(--text-muted); }
.hero-image {
  position: relative; overflow: hidden;
}
.hero-image img {
  width: 100%; height: 100%; object-fit: cover;
}
.hero-image::before {
  content: ''; position: absolute; top: 0; right: 0; bottom: 0;
  width: 80px; z-index: 2;
  background: linear-gradient(to left, var(--blush), transparent);
}

/* ─── SECTIONS ─── */
.section { padding: 48px 72px; }
.section-eyebrow {
  color: var(--teal); font-size: 0.68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px;
}
.section-title {

  font-size: clamp(1.5rem, 2.6vw, 2.2rem); color: var(--navy); margin-bottom: 24px;
}

/* ─── CATEGORY TABS ─── */
.cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.cat-tab {
  background: var(--white); border: 1.5px solid #E0E0E0; color: var(--text-muted);
  padding: 8px 18px; border-radius: var(--radius-pill);
  font-family: var(--font-body); font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s ease;
  display: inline-flex; align-items: center; gap: 6px;
}
.cat-tab:hover { border-color: var(--navy); color: var(--navy); }
.cat-tab.active { background: var(--navy); border-color: var(--navy); color: white; }

/* ─── PRODUCTS HEADER ─── */
.products-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 18px;
}
.products-count { font-size: 0.82rem; color: var(--text-muted); }
.sort-select {
  padding: 8px 14px; border: 1.5px solid #E0E0E0; border-radius: var(--radius-md);
  font-family: var(--font-body); font-size: 0.82rem; color: var(--text);
  background: white; cursor: pointer;
}

/* ─── PRODUCT GRID ─── */
.product-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
}
.grid-featured {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-bottom: 24px;
}

/* ─── PRODUCT CARD ─── */

}
.card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
.card-image-wrap {

}
.grid-featured .card-image-wrap { aspect-ratio: 3/2; }
.card-image-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease;
}
.card:hover .card-image-wrap img { transform: scale(1.06); }
.badge {

.badge-top { background: var(--navy); color: var(--gold); }
.badge-drop { background: var(--rose); color: white; }
.badge-new { background: var(--teal); color: white; }
.wishlist-btn {
  position: absolute; top: 12px; right: 12px;

.wishlist-btn.active { color: #EF4444; }

}
.card-title {
  font-weight: 700; font-size: 1.1rem; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.rating-row {
  display: flex; align-items: center; gap: 6px; font-size: 0.78rem;
}
.stars { color: var(--gold); letter-spacing: 1px; }
.rating-num { font-weight: 600; color: var(--text); }
.rating-count { color: var(--text-muted); }
.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 4px; padding-top: 12px; border-top: 1px solid #f0f0f0;
}
.price-wrap { display: flex; align-items: baseline; gap: 8px; }
.price-original {
  text-decoration: line-through; color: var(--text-muted); font-size: 0.82rem;
}
.price-current { font-family: var(--font-display); font-size: 1.2rem; color: var(--navy); }
.price-current.sale { color: var(--rose); }
.btn-cta {

  background: var(--rose); color: white;
  padding: 8px 18px; border-radius: var(--radius-pill);
  font-family: var(--font-body); font-size: 0.78rem; font-weight: 600;
  text-decoration: none; transition: background 0.2s ease;
}
.btn-cta:hover { background: var(--rose-hover); }
.btn-cta svg { transform: scaleX(-1); }

/* ─── RANK BAR ─── */
.rank-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.rank-number { font-family: var(--font-display); font-size: 1rem; color: var(--navy); font-weight: 700; min-width: 28px; }
.rank-bar-bg { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
.rank-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(to left, var(--gold), var(--rose)); }

/* ─── TRUST BAR ─── */
.trust-section { background: var(--navy); padding: 40px 72px; }
.trust-pillars {

.trust-divider { width: 1px; height: 48px; background: rgba(255,255,255,0.15); }
.trust-pillar { display: flex; align-items: center; gap: 14px; }
.trust-icon {

  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;

.page-header {

/* ─── EMPTY STATE ─── */

/* ─── ABOUT ─── */
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }

.value-card {

.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
.team-card { text-align: center; }
.team-avatar {
  width: 64px; height: 64px; border-radius: 50%; background: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; margin: 0 auto 12px;
}
.team-name { font-weight: 700; font-size: 0.92rem; color: var(--navy); }
.team-role { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
.contact-bar {
  background: var(--navy); padding: 32px 72px; margin-top: 48px;
  display: flex; justify-content: center; gap: 48px; flex-wrap: wrap;
}
.contact-item { color: white; font-size: 0.88rem; display: flex; align-items: center; gap: 8px; }

/* ─── FOOTER ─── */
.footer {
  background: var(--dark-footer); padding: 28px 72px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
}
.footer-logo {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-display); font-size: 1.2rem; color: white;
  direction: ltr; display: flex; align-items: center; gap: 4px;
}
.footer-logo .gold { color: var(--gold); }
.footer-links { display: flex; gap: 8px; list-style: none; }
.footer-links button {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.5); font-family: var(--font-body);
  font-size: 0.78rem; transition: color 0.2s ease;
}
.footer-links button:hover { color: white; }
.footer-copy { color: rgba(255,255,255,0.3); font-size: 0.72rem; }


/* ─── RESPONSIVE ─── */
@media (max-width: 1100px) {
  .product-grid { grid-template-columns: repeat(2, 1fr); }
  .section { padding: 36px; }
}
@media (max-width: 768px) {
  .nav { padding: 0 14px; }
  .nav-links button { font-size: 0.72rem; padding: 5px 8px; }
  .hero { grid-template-columns: 1fr; min-height: auto; }
  .hero-image { height: 200px; order: -1; }
  .hero-image::before { display: none; }
  .hero-content { padding: 26px 16px; }
  .hero-stats { flex-wrap: wrap; gap: 14px; }
  .section, .page-header { padding-left: 16px; padding-right: 16px; }
  .product-grid, .grid-featured { grid-template-columns: 1fr; }
  .trust-pillars { flex-direction: column; align-items: flex-start; gap: 14px; }
  .trust-divider { display: none; }
  .trust-section { padding: 28px 16px; }
  .disclosure-bar { padding: 14px 16px; }
  .about-grid { grid-template-columns: 1fr; }
  .values-grid { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: 1fr 1fr; }
  .products-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .footer { flex-direction: column; align-items: flex-start; padding: 20px 16px; }

  .contact-bar { padding: 24px 16px; gap: 24px; }
}
`;

/* ─── HELPERS ─── */
function normalizeProduct(row) {
  const yesNo = (v) => String(v ?? '').trim().toLowerCase() === 'yes';
  return {
    id: parseInt(row.id) || 0,
    category_ids: String(row.category_ids || row.category_id || row.category || '').split(',').map(s => s.trim()).filter(Boolean),
    title: String(row.title || '').trim(),
    badge: String(row.badge || '').trim().toLowerCase(),
    badge_label: String(row.badge_label || '').trim(),
    image_url: String(row.image_url || row.image || '').trim(),
    rating: parseFloat(row.rating) || 0,
    reviews: parseInt(row.reviews) || 0,
    price: String(row.price || '').trim(),
    original_price: String(row.original_price || '').trim(),
    affiliate_link: String(row.affiliate_link || row.link || '#').trim() || '#',
    is_recommended: yesNo(row.is_recommended),
    is_new: yesNo(row.is_new),
    is_bestseller: yesNo(row.is_bestseller),
  };
}

function normalizeCategory(row) {
  return {
    id: String(row.id || '').trim(),
    label: String(row.label || row.name || row.id || '').trim(),
    icon: String(row.icon || '🐾').trim(),
    sort_order: parseInt(row.sort_order) || 99,
  };
}

function buildStars(rating) {
  let s = '';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '☆';
  return s;
}

function applySorting(list, sortValue) {
  const copy = [...list];
  switch (sortValue) {
    case 'price_asc': return copy.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
    case 'price_desc': return copy.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
    case 'rating': return copy.sort((a, b) => b.rating - a.rating);
    default: return copy;
  }
}

/* ─── CSV LOADER ─── */
function loadCSV(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true, header: true, skipEmptyLines: true,
      complete: (r) => resolve(r.data),
      error: (e) => reject(e),
    });
  });
}

/* ─── APP ─── */
function App() {
  const [page, setPage] = useState('home');
  const [products, setProducts] = useState(FALLBACK_PRODUCTS);
  const [categories, setCategories] = useState(FALLBACK_CATEGORIES);

  useEffect(() => {
    async function fetchCSV() {
      try {
        const [prodRows, catRows] = await Promise.all([
          loadCSV('products.csv').catch(() => null),
          loadCSV('categories.csv').catch(() => null),
        ]);
        if (catRows && catRows.length > 0) {
          setCategories(catRows.map(normalizeCategory));
        }
        if (prodRows && prodRows.length > 0) {
          setProducts(prodRows.map(normalizeProduct));
        }
        console.log(`✅ PawFinds: loaded ${prodRows?.length || 0} products, ${catRows?.length || 0} categories from CSV`);
      } catch (e) {
        console.log('ℹ️ PawFinds: CSV not found, using fallback data');
      }
    }
    fetchCSV();
  }, []);

  function goToPage(pageId) {
    setPage(pageId);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  return (
    <>
      <style>{css}</style>
      <Nav currentPage={page} onNavigate={goToPage} />

      {page === 'home' && <HomePage products={products} categories={categories} onNavigate={goToPage} />}
      {page === 'recommended' && <RecommendedPage products={products} categories={categories} />}
      {page === 'new' && <NewPage products={products} categories={categories} />}
      {page === 'bestsellers' && <BestsellersPage products={products} categories={categories} />}
      {page === 'about' && <AboutPage onNavigate={goToPage} />}

      <Footer onNavigate={goToPage} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
